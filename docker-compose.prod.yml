version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context: ./backend
      target:  production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          3001
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
      JWT_SECRET:    ${JWT_SECRET}
      LTI_KEY:       ${LTI_KEY}
      FRONTEND_URL:  ${FRONTEND_URL}

  frontend:
    build:
      context: ./frontend
      target:  production
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
