services:
  - type: web
    name: cetu-lms
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    numInstances: 2
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Must match the Render instance count; startup fails closed without Redis.
      - key: BACKEND_INSTANCE_COUNT
        value: 2
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cetu-lms-realtime
          property: connectionString
      - key: DATABASE_URL
        sync: false   # set manually in dashboard; paste your Neon connection string
      - key: JWT_SECRET
        generateValue: true
      - key: LTI_KEY
        sync: false   # set manually in dashboard; must be exactly 32 chars
      - key: FRONTEND_URL
        sync: false   # set to your Render service URL after first deploy
      - key: R2_ENDPOINT
        sync: false   # Cloudflare R2 S3-compatible endpoint
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: pact
      - key: R2_PUBLIC_BASE_URL
        sync: false   # public CDN URL for R2 bucket (no trailing slash) - required for slide deck downloads

  - type: keyvalue
    name: cetu-lms-realtime
    plan: free
    ipAllowList: []
    maxmemoryPolicy: volatile-ttl
    persistenceMode: off
